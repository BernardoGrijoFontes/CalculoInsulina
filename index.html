<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f7fb;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1{
            margin-bottom: 30px;
        }

        div{
            background-color: white;
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        input{
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            background-color: #580463;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: #640570;
        }

        h3{
            margin: 10px 0 5px 0;
        }

        #insulinacafe,
        #insulinaalmoco,
        #insulinajanta{
            color: #580463;
            font-weight: bold;
            margin-top: 10px;
        }
        @media (max-width: 500px){

        h1{
            font-size: 22px;
        }

        div{
            padding: 18px;
        }

        }
    </style>
</head>
<body>
    <h1>Calcule a quantidade de insulina que você precisa aplicar!</h1>
    <div>   
        <h2>Café da manhã:</h2>
        <form>
            <h3>Carboidratos:</h3>
            <input type="text" id="carbocafe">
            <h3>Glicose:</h3>
            <input type="text" id="glicocafe">
            <h3 id="insulinacafe"></h3>
            <button type="button" onclick="calcularcafe()">Calcule!</button>
        </form>
    </div> 
    <div>   
        <h2>Antes do almoço:</h2>
        <form>
            <h3>Carboidratos:</h3>
            <input type="text" id="carboalmoco">
            <h3>Glicose:</h3>
            <input type="text" id="gicoalmoco">
            <h3 id="insulinaalmoco"></h3>
            <button type="button" onclick="calcularalmoco()">Calcule!</button>
        </form>
    </div> 
    <div>   
        <h2>Antes do jantar:</h2>
        <form>
            <h3>Carboidratos:</h3>
            <input type="text" id="carbojanta">
            <h3>Glicose:</h3>
            <input type="text" id="glicojanta">
            <h3 id="insulinajanta"></h3>
            <button type="button" onclick="calcularjanta()">Calcule!</button>
        </form>
    </div> 

    <script>
        function calcularcafe(){

            let carbo = Number(document.getElementById("carbocafe").value);
            let glicose = Number(document.getElementById("glicocafe").value);
            let correcao = (glicose - 100) / 35;
            if (correcao < 0) {
                correcao = 0;
            }
            let insulina = (carbo / 6) + correcao;
            document.getElementById("insulinacafe").innerHTML =
            "Você precisa aplicar aproximadamente " + insulina.toFixed(0) + " unidades de insulina";

        }  
        
        function calcularalmoco(){

            let carbo = Number(document.getElementById("carboalmoco").value);
            let glicose = Number(document.getElementById("glicojanta").value);
            let correcao = (glicose - 100) / 35;
            if (correcao < 0) {
                correcao = 0;
            }
            let insulina = (carbo / 6) + correcao;

            document.getElementById("insulinaalmoco").innerHTML =
            "Você precisa aplicar aproximadamente " + insulina.toFixed(0) + " unidades de insulina";

        }   

        function calcularjanta(){

            let carbo = Number(document.getElementById("carbojanta").value);
            let glicose = Number(document.getElementById("glicojanta").value);
                        let correcao = (glicose - 100) / 35;
            if (correcao < 0) {
                correcao = 0;
            }
            let insulina = (carbo / 6) + correcao;
            document.getElementById("insulinajanta").innerHTML =
            "Você precisa aplicar aproximadamente " + insulina.toFixed(0) + " unidades de insulina";

        }   
    </script>
</body>
</html>
